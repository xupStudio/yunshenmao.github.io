name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_run:
    workflows: ["Sync FB posts"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.gate.outputs.proceed }}
    steps:
      - uses: actions/checkout@v6

      - name: Gate on sync commit
        id: gate
        run: |
          if [ "${{ github.event_name }}" != "workflow_run" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          MSG=$(git log -1 --pretty=%s)
          if [[ "$MSG" == "chore(journal): sync FB posts"* ]]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No new sync commit on main; skipping deploy."
          fi

      - uses: actions/setup-node@v6
        if: steps.gate.outputs.proceed == 'true'
        with:
          node-version: 24
          cache: npm

      - if: steps.gate.outputs.proceed == 'true'
        run: npm ci

      - if: steps.gate.outputs.proceed == 'true'
        run: npm run build

      - name: Add .nojekyll and CNAME
        if: steps.gate.outputs.proceed == 'true'
        run: |
          touch out/.nojekyll
          cp CNAME out/CNAME

      - uses: actions/configure-pages@v6
        if: steps.gate.outputs.proceed == 'true'

      - uses: actions/upload-pages-artifact@v5
        if: steps.gate.outputs.proceed == 'true'
        with:
          path: out

  deploy:
    needs: build
    if: needs.build.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
